<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../assets/bright.css" id="theme-style">
    <link rel="stylesheet" href="../assets/style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap"
        rel="stylesheet">
    <title>Admin - Histoire</title>
</head>

<body class="inter bg-custom-secondary">

    <!-- HEADER -->
    <header>
        <div class="container-fluid col-10">
            <div class="pt-3 pt-md-4">
                <nav class="navbar navbar-expand-lg navbar-custom px-3 px-md-5 py-3 rounded-4">
                    <div class="container-fluid px-0 d-flex align-items-center">
                        <a class="navbar-brand p-0 me-0" href="../index.html">
                            <img src="../assets/img/logo edb.png" alt="Logo Échiquier de Bigorre" class="logo-img">
                        </a>
                        <div class="collapse navbar-collapse mt-3 mt-lg-0" id="navbarMenu">
                            <ul
                                class="navbar-nav mx-auto d-flex flex-column flex-lg-row gap-2 gap-lg-5 mb-3 mb-lg-0 text-center">
                                <li class="nav-item"><a class="nav-link fs-5" href="../histoire.html">Histoire</a></li>
                                <li class="nav-item"><a class="nav-link fs-5" href="../tournois.html">Tournois</a></li>
                                <li class="nav-item"><a class="nav-link fs-5" href="../tarifs.html">Tarifs</a></li>
                                <li class="nav-item"><a class="nav-link fs-5" href="../actualites.html">Actualités</a>
                                </li>
                            </ul>
                            <div class="d-flex justify-content-center mb-2 mb-lg-0">
                                <a href="../contact.html" class="btn-noir px-5 py-2"><span
                                        class="fs-6 play-bold">Contact</span></a>
                            </div>
                        </div>
                    </div>
                </nav>
            </div>
        </div>
    </header>

    <main>
        <!-- Titre -->
        <div class="espace-sommaire">
            <div class="mt-5 pt-5">
                <div class="row justify-content-center">
                    <div class="col-10 d-flex justify-content-center align-items-center gap-3">
                        <h1 class="play-bold mb-0 size-titre">Histoire</h1>
                    </div>
                </div>
            </div>
        </div>

        <!-- Nav admin -->
        <div class="d-flex justify-content-center align-items-center mb-4">
            <ul class="navbar-nav admin-nav text-center d-flex flex-row gap-5">
                <li class="nav-item"><a class="nav-link fs-5 admin-nav-active" href="./AdminHistoire.html">Histoire</a>
                </li>
                <li class="nav-item"><a class="nav-link fs-5" href="./AdminTournois.html">Tournois</a></li>
                <li class="nav-item"><a class="nav-link fs-5" href="./AdminTarifs.html">Tarifs</a></li>
                <li class="nav-item"><a class="nav-link fs-5" href="./AdminActus.html">Actualités</a></li>
            </ul>
        </div>

        <!-- Zone d'édition -->
        <div class="d-flex align-items-center justify-content-center mb-5">
            <div class="bg-custom-primary py-4 px-4 col-10 col-lg-8">

                <!-- Bouton ajouter -->
                <button class="btn-add mb-3" onclick="ajouterSection()">+</button>

                <!-- En-tête du tableau -->
                <div class="admin-table-header">
                    <div>Titre</div>
                    <div>Texte</div>
                    <div>Image</div>
                    <div></div>
                </div>

                <!-- Sections -->
                <div id="sectionsContainer"></div>

                <!-- Bouton sauvegarder -->
                <div class="d-flex justify-content-end mt-4">
                    <button class="btn-or px-5 py-2 fs-5 play-bold" onclick="sauvegarder()">
                        <span>Sauvegarder</span>
                    </button>
                </div>

            </div>
        </div>

    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        if (!sessionStorage.getItem('admin_connecte')) {
            window.location.href = '../login.html';
        }

        const sectionsParDefaut = [
            {
                titre: 'IV - Situation actuelle',
                texte: 'Depuis 2024, le club évolue en Nationale 3. Il organise également chaque année deux tournois : l\'Open International de Tarbes depuis 1993, ouvert à tous (plus d\'informations sur la page Tournois), et le tournoi interne Marc Lasserre, un clin d\'œil au fondateur du club.',
                image: ''
            }
        ];

        let sections = JSON.parse(localStorage.getItem('histoire_sections'));

        if (!sections) {
            sections = sectionsParDefaut;
            localStorage.setItem('histoire_sections', JSON.stringify(sections));
        }

        function render() {
            const container = document.getElementById('sectionsContainer');
            container.innerHTML = '';
            sections.forEach((section, index) => {
                const row = document.createElement('div');
                row.className = 'admin-section-row';
                row.innerHTML = `
                    <div>
                        <textarea class="champ-admin-titre" rows="3" placeholder="Titre...">${section.titre}</textarea>
                    </div>
                    <div>
                        <textarea class="champ-admin" rows="5" placeholder="Texte...">${section.texte}</textarea>
                    </div>
                    <div class="d-flex flex-column align-items-center gap-2">
                        <input type="file" accept="image/*" class="form-control form-control-sm" onchange="chargerImage(event, ${index})">
                        <img id="preview-${index}" class="img-preview" ${section.image ? `src="${section.image}" style="display:block"` : ''}>
                    </div>
                    <div class="d-flex align-items-center justify-content-center">
                        <button class="btn-delete" onclick="supprimerSection(${index})">
                            <i class="bi bi-trash"></i>
                        </button>
                    </div>
                `;
                container.appendChild(row);
            });
        }

        function ajouterSection() {
            sections.push({ titre: '', texte: '', image: '' });
            render();
        }

        function supprimerSection(index) {
            sections.splice(index, 1);
            render();
        }

        function chargerImage(event, index) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                sections[index].image = e.target.result;
                const preview = document.getElementById(`preview-${index}`);
                preview.src = e.target.result;
                preview.style.display = 'block';
            };
            reader.readAsDataURL(file);
        }

        function sauvegarder() {
            document.querySelectorAll('.admin-section-row').forEach((row, index) => {
                const textareas = row.querySelectorAll('textarea');
                if (textareas[0]) sections[index].titre = textareas[0].value;
                if (textareas[1]) sections[index].texte = textareas[1].value;
            });
            localStorage.setItem('histoire_sections', JSON.stringify(sections));
            alert('Sauvegardé !');
        }

        render();
    </script>

</body>

</html>
