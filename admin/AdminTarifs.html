<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../assets/bright.css" id="theme-style">
    <link rel="stylesheet" href="../assets/style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap" rel="stylesheet">
    <title>Admin - Tarifs</title>
</head>

<body class="inter bg-custom-secondary">

    <!-- HEADER -->
    <header>
        <div class="container-fluid col-10">
            <div class="pt-3 pt-md-4">
                <nav class="navbar navbar-expand-lg navbar-custom px-3 px-md-5 py-3 rounded-4">
                    <div class="container-fluid px-0 d-flex align-items-center">
                        <a class="navbar-brand p-0 me-0" href="../index.html">
                            <img src="../assets/img/logo edb.png" alt="Logo Échiquier de Bigorre" class="logo-img">
                        </a>
                        <div class="collapse navbar-collapse mt-3 mt-lg-0" id="navbarMenu">
                            <ul class="navbar-nav mx-auto d-flex flex-column flex-lg-row gap-2 gap-lg-5 mb-3 mb-lg-0 text-center">
                                <li class="nav-item"><a class="nav-link fs-5" href="../histoire.html">Histoire</a></li>
                                <li class="nav-item"><a class="nav-link fs-5" href="../tournois.html">Tournois</a></li>
                                <li class="nav-item"><a class="nav-link fs-5" href="../tarifs.html">Tarifs</a></li>
                                <li class="nav-item"><a class="nav-link fs-5" href="../actualites.html">Actualités</a></li>
                            </ul>
                            <div class="d-flex justify-content-center mb-2 mb-lg-0">
                                <a href="../contact.html" class="btn-noir px-5 py-2"><span class="fs-6 play-bold">Contact</span></a>
                            </div>
                        </div>
                    </div>
                </nav>
            </div>
        </div>
    </header>

    <main>
        <!-- Titre -->
        <div class="espace-sommaire">
            <div class="mt-5 pt-5">
                <div class="row justify-content-center">
                    <div class="col-10 d-flex justify-content-center align-items-center gap-3">
                        <h1 class="play-bold mb-0 size-titre">Tarifs</h1>
                    </div>
                </div>
            </div>
        </div>

        <!-- Nav admin -->
        <div class="d-flex justify-content-center align-items-center mb-4">
            <ul class="navbar-nav admin-nav text-center d-flex flex-row gap-5">
                <li class="nav-item"><a class="nav-link fs-5" href="./AdminHistoire.html">Histoire</a></li>
                <li class="nav-item"><a class="nav-link fs-5" href="./AdminTournois.html">Tournois</a></li>
                <li class="nav-item"><a class="nav-link fs-5 admin-nav-active" href="./AdminTarifs.html">Tarifs</a></li>
                <li class="nav-item"><a class="nav-link fs-5" href="./AdminActus.html">Actualités</a></li>
            </ul>
        </div>

        <!-- Zone d'édition -->
        <div class="d-flex align-items-center justify-content-center mb-5">
            <div class="bg-custom-primary py-4 px-4 col-10 col-lg-8 d-flex flex-column gap-4">

                <!-- Bouton ajouter catégorie -->
                <div class="d-flex justify-content-center">
                    <button class="btn-add px-5" onclick="ajouterCategorie()">Ajouter une catégorie</button>
                </div>

                <!-- Catégories -->
                <div id="categoriesContainer"></div>

                <!-- Horaires -->
                <div class="mt-4">
                    <h2 class="play-bold text-custom-white fs-4 mb-3">Horaires</h2>
                    <div id="horairesContainer" class="d-flex flex-column gap-2"></div>
                    <button class="btn-add mt-2" onclick="ajouterHoraire()">+</button>
                </div>

                <!-- Sauvegarder -->
                <div class="d-flex justify-content-end mt-3">
                    <button class="btn-or px-5 py-2 fs-6 play-bold" onclick="sauvegarder()">
                        <span>Sauvegarder</span>
                    </button>
                </div>

            </div>
        </div>

    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        if (!sessionStorage.getItem('admin_connecte')) {
            window.location.href = '../login.html';
        }

        let categories = JSON.parse(localStorage.getItem('tarifs_categories')) || [
            {
                titre: 'Tarifs - Adultes',
                lignes: [
                    { description: 'Première année (sans licence)', prix: 'Gratuit' },
                    { description: 'Adultes - Licence A', prix: '79€' },
                    { description: 'Adultes - Licence B', prix: '39€' },
                ]
            },
            {
                titre: 'Tarifs - École d\'Échecs',
                lignes: [
                    { description: 'Licence Enfants', prix: '160€' },
                    { description: 'Deuxième enfant d\'une même famille', prix: '90€' },
                ]
            }
        ];

        let horaires = JSON.parse(localStorage.getItem('tarifs_horaires')) || [
            { texte: '17h le mercredi au club' },
            { texte: '13h le samedi au Jardin Massey' },
        ];

        function renderCategories() {
            const container = document.getElementById('categoriesContainer');
            container.innerHTML = '';
            categories.forEach((cat, catIndex) => {
                const div = document.createElement('div');
                div.className = 'mb-4';
                div.innerHTML = `
                    <div class="d-flex align-items-center gap-3 mb-2">
                        <input class="champ-admin sous-titre fst-italic fs-5 text-custom-white" type="text" value="${cat.titre}" placeholder="Nom de la catégorie" onchange="categories[${catIndex}].titre = this.value">
                        <button class="btn-delete" onclick="supprimerCategorie(${catIndex})" title="Supprimer la catégorie"><i class="bi bi-trash"></i></button>
                        <button class="btn-delete" onclick="monterCategorie(${catIndex})" title="Monter"><i class="bi bi-chevron-up"></i></button>
                        <button class="btn-delete" onclick="descendreCategorie(${catIndex})" title="Descendre"><i class="bi bi-chevron-down"></i></button>
                    </div>

                    <div class="admin-table-header" style="grid-template-columns: 1fr 120px 50px 50px;">
                        <div>Description</div>
                        <div>Prix</div>
                        <div></div>
                        <div></div>
                    </div>

                    <div id="lignes-${catIndex}"></div>

                    <button class="btn-add mt-2" onclick="ajouterLigne(${catIndex})">+</button>
                `;
                container.appendChild(div);
                renderLignes(catIndex);
            });
        }

        function renderLignes(catIndex) {
            const container = document.getElementById(`lignes-${catIndex}`);
            container.innerHTML = '';
            categories[catIndex].lignes.forEach((ligne, ligneIndex) => {
                const row = document.createElement('div');
                row.className = 'admin-section-row';
                row.style.gridTemplateColumns = '1fr 120px 50px 50px';
                row.innerHTML = `
                    <div class="d-flex align-items-center gap-2">
                        <i class="bi bi-pencil text-custom-white"></i>
                        <input class="champ-admin" type="text" value="${ligne.description}" placeholder="Description...">
                    </div>
                    <div><input class="champ-admin" type="text" value="${ligne.prix}" placeholder="Prix..."></div>
                    <div class="d-flex align-items-center justify-content-center">
                        <button class="btn-delete" onclick="supprimerLigne(${catIndex}, ${ligneIndex})"><i class="bi bi-trash"></i></button>
                    </div>
                    <div class="d-flex align-items-center justify-content-center">
                        <button class="btn-delete" onclick="monterLigne(${catIndex}, ${ligneIndex})"><i class="bi bi-chevron-up"></i></button>
                    </div>
                `;
                container.appendChild(row);
            });
        }

        function ajouterCategorie() {
            categories.push({ titre: 'Nouvelle catégorie', lignes: [] });
            renderCategories();
        }

        function supprimerCategorie(index) {
            if (confirm('Supprimer cette catégorie ?')) {
                categories.splice(index, 1);
                renderCategories();
            }
        }

        function monterCategorie(index) {
            if (index === 0) return;
            [categories[index - 1], categories[index]] = [categories[index], categories[index - 1]];
            renderCategories();
        }

        function descendreCategorie(index) {
            if (index === categories.length - 1) return;
            [categories[index + 1], categories[index]] = [categories[index], categories[index + 1]];
            renderCategories();
        }

        function ajouterLigne(catIndex) {
            categories[catIndex].lignes.push({ description: '', prix: '' });
            renderCategories();
        }

        function supprimerLigne(catIndex, ligneIndex) {
            categories[catIndex].lignes.splice(ligneIndex, 1);
            renderCategories();
        }

        function monterLigne(catIndex, ligneIndex) {
            if (ligneIndex === 0) return;
            const lignes = categories[catIndex].lignes;
            [lignes[ligneIndex - 1], lignes[ligneIndex]] = [lignes[ligneIndex], lignes[ligneIndex - 1]];
            renderCategories();
        }

        function renderHoraires() {
            const container = document.getElementById('horairesContainer');
            container.innerHTML = '';
            horaires.forEach((h, index) => {
                const row = document.createElement('div');
                row.className = 'admin-section-row';
                row.style.gridTemplateColumns = '1fr 50px';
                row.innerHTML = `
                    <div><input class="champ-admin" type="text" value="${h.texte}" placeholder="Horaire..."></div>
                    <div class="d-flex align-items-center justify-content-center">
                        <button class="btn-delete" onclick="supprimerHoraire(${index})"><i class="bi bi-trash"></i></button>
                    </div>
                `;
                container.appendChild(row);
            });
        }

        function ajouterHoraire() {
            horaires.push({ texte: '' });
            renderHoraires();
        }

        function supprimerHoraire(index) {
            horaires.splice(index, 1);
            renderHoraires();
        }

        function sauvegarder() {
            // Sauvegarde catégories
            document.querySelectorAll('#categoriesContainer > div').forEach((catDiv, catIndex) => {
                const titreInput = catDiv.querySelector('input[type="text"]');
                if (titreInput) categories[catIndex].titre = titreInput.value;

                const ligneRows = document.querySelectorAll(`#lignes-${catIndex} .admin-section-row`);
                ligneRows.forEach((row, ligneIndex) => {
                    const inputs = row.querySelectorAll('input');
                    categories[catIndex].lignes[ligneIndex].description = inputs[0].value;
                    categories[catIndex].lignes[ligneIndex].prix = inputs[1].value;
                });
            });

            // Sauvegarde horaires
            document.querySelectorAll('#horairesContainer .admin-section-row').forEach((row, index) => {
                const input = row.querySelector('input');
                horaires[index].texte = input.value;
            });

            localStorage.setItem('tarifs_categories', JSON.stringify(categories));
            localStorage.setItem('tarifs_horaires', JSON.stringify(horaires));
            alert('Sauvegardé !');
        }

        renderCategories();
        renderHoraires();
    </script>

</body>
</html>
