<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../assets/bright.css" id="theme-style">
    <link rel="stylesheet" href="../assets/style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap" rel="stylesheet">
    <title>Admin - Tournois</title>
</head>

<body class="inter bg-custom-secondary">

    <!-- HEADER -->
    <header>
        <div class="container-fluid col-10">
            <div class="pt-3 pt-md-4">
                <nav class="navbar navbar-expand-lg navbar-custom px-3 px-md-5 py-3 rounded-4">
                    <div class="container-fluid px-0 d-flex align-items-center">
                        <a class="navbar-brand p-0 me-0" href="../index.html">
                            <img src="../assets/img/logo edb.png" alt="Logo Échiquier de Bigorre" class="logo-img">
                        </a>
                        <div class="collapse navbar-collapse mt-3 mt-lg-0" id="navbarMenu">
                            <ul class="navbar-nav mx-auto d-flex flex-column flex-lg-row gap-2 gap-lg-5 mb-3 mb-lg-0 text-center">
                                <li class="nav-item"><a class="nav-link fs-5" href="../histoire.html">Histoire</a></li>
                                <li class="nav-item"><a class="nav-link fs-5" href="../tournois.html">Tournois</a></li>
                                <li class="nav-item"><a class="nav-link fs-5" href="../tarifs.html">Tarifs</a></li>
                                <li class="nav-item"><a class="nav-link fs-5" href="../actualites.html">Actualités</a></li>
                            </ul>
                            <div class="d-flex justify-content-center mb-2 mb-lg-0">
                                <a href="../contact.html" class="btn-noir px-5 py-2"><span class="fs-6 play-bold">Contact</span></a>
                            </div>
                        </div>
                    </div>
                </nav>
            </div>
        </div>
    </header>

    <main>
        <!-- Titre -->
        <div class="espace-sommaire">
            <div class="mt-5 pt-5">
                <div class="row justify-content-center">
                    <div class="col-10 d-flex justify-content-center align-items-center gap-3">
                        <h1 class="play-bold mb-0 size-titre">Tournois</h1>
                    </div>
                </div>
            </div>
        </div>

        <!-- Nav admin -->
        <div class="d-flex justify-content-center align-items-center mb-4">
            <ul class="navbar-nav admin-nav text-center d-flex flex-row gap-5">
                <li class="nav-item"><a class="nav-link fs-5" href="./AdminHistoire.html">Histoire</a></li>
                <li class="nav-item"><a class="nav-link fs-5 admin-nav-active" href="./AdminTournois.html">Tournois</a></li>
                <li class="nav-item"><a class="nav-link fs-5" href="./AdminTarifs.html">Tarifs</a></li>
                <li class="nav-item"><a class="nav-link fs-5" href="./AdminActus.html">Actualités</a></li>
            </ul>
        </div>

        <!-- Zone d'édition -->
        <div class="d-flex align-items-center justify-content-center mb-5">
            <div class="bg-custom-primary py-4 px-4 col-10 col-lg-8">

                <!-- Palmarès -->
                <h2 class="play-bold text-custom-white fs-4 mb-3">Palmarès</h2>
                <button class="btn-add mb-3" onclick="ajouterLigne()">+</button>

                <div class="admin-table-header" style="grid-template-columns: 1fr 1fr 1fr 50px;">
                    <div>Tournoi</div>
                    <div>Vainqueur Open principal</div>
                    <div>Vainqueur tournoi Blavignac</div>
                    <div></div>
                </div>

                <div id="palmaresContainer"></div>

                <div class="d-flex justify-content-end mt-3 mb-5">
                    <button class="btn-or px-5 py-2 fs-6 play-bold" onclick="sauvegarderPalmares()">
                        <span>Sauvegarder</span>
                    </button>
                </div>

                <!-- Prochains tournois -->
                <h2 class="play-bold text-custom-white fs-4 mb-3 mt-5">Prochains tournois</h2>
                <button class="btn-add mb-3" onclick="ajouterTournoi()">+</button>

                <div class="admin-table-header" style="grid-template-columns: 1fr 1fr 1fr 1fr 50px;">
                    <div>Nom</div>
                    <div>Date début</div>
                    <div>Date fin</div>
                    <div>Lieu</div>
                    <div></div>
                </div>

                <div id="tournoiContainer"></div>

                <div class="d-flex justify-content-end mt-3">
                    <button class="btn-or px-5 py-2 fs-6 play-bold" onclick="sauvegarderTournois()">
                        <span>Sauvegarder</span>
                    </button>
                </div>

            </div>
        </div>

    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        if (!sessionStorage.getItem('admin_connecte')) {
            window.location.href = '../login.html';
        }

        // ===================== PALMARES =====================
        let palmares = JSON.parse(localStorage.getItem('palmares')) || [
            { tournoi: 'Tournoi 1993', open: 'KOMAROV Dimitri', blavignac: '' },
            { tournoi: 'Tournoi 1994', open: 'ARCOTIK', blavignac: '' },
            { tournoi: 'Tournoi 1995', open: 'INKIOV Vendeslav', blavignac: '' },
            { tournoi: 'Tournoi 1996', open: 'INKIOV Vendeslav', blavignac: '' },
            { tournoi: 'Tournoi 1997', open: 'BRICARD Emmanuel', blavignac: '' },
            { tournoi: 'Tournoi 1998', open: 'RADULOV Ivan', blavignac: '' },
            { tournoi: 'Tournoi 1999', open: 'KLUNT Klaus', blavignac: '' },
            { tournoi: 'Tournoi 2000', open: 'INKIOV Vendeslav', blavignac: '' },
            { tournoi: 'Tournoi 2001', open: 'RAUSIS Igors', blavignac: '' },
            { tournoi: 'Tournoi 2002', open: 'VELIKOV Petar', blavignac: 'LACROIX Romain' },
            { tournoi: 'Tournoi 2003', open: 'BARSOV Alexei', blavignac: 'GOSSIEAUX Benoît' },
            { tournoi: 'Tournoi 2004', open: 'COUSIGNE Frédéric', blavignac: 'CILLO Angelo' },
            { tournoi: 'Tournoi 2005', open: 'CORNETTE Matthieu', blavignac: 'BENALI Boubaker' },
            { tournoi: 'Tournoi 2006', open: 'AOUT Sébastien', blavignac: 'BAUMGARTNER Georges' },
            { tournoi: 'Tournoi 2007', open: 'INKIOV Vendeslav', blavignac: 'ANKIRI Avner' },
            { tournoi: 'Tournoi 2008', open: 'JOOSSIEN Arnaud', blavignac: 'SERRA Yvan' },
            { tournoi: 'Tournoi 2009', open: 'INKIOV Vendeslav', blavignac: 'BIELEC Frédéric' },
            { tournoi: 'Tournoi 2010', open: 'HAMDOUCHI Hicham', blavignac: 'SOISSONG Elzbieta' },
            { tournoi: 'Tournoi 2011', open: 'BARZOV Alexi', blavignac: 'BENAYOUN David' },
            { tournoi: 'Tournoi 2012', open: 'MAZE Sébastien', blavignac: 'RAGUENEAU Yann' },
            { tournoi: 'Tournoi 2013', open: 'CORNETTE Matthieu', blavignac: 'LABAT Axel' },
            { tournoi: 'Tournoi 2014', open: 'MAZE Sébastien', blavignac: 'JOIN Etienne' },
            { tournoi: 'Tournoi 2015', open: 'GROMOVS Sergejs', blavignac: 'CAMILLERI Hervé' },
            { tournoi: 'Tournoi 2016', open: 'ALBETS Armengol R.', blavignac: 'MATHEY Fannie' },
            { tournoi: 'Tournoi 2017', open: 'LLANEZA VEGA M.', blavignac: 'BERRIFE William' },
            { tournoi: 'Tournoi 2018', open: 'SELEBRAN Henri', blavignac: 'PHALIPPOU Philippe' },
            { tournoi: 'Tournoi 2019', open: 'VIERS Mathieu', blavignac: 'VIERS Alexandre' },
            { tournoi: 'Tournoi 2020', open: '', blavignac: '' },
            { tournoi: 'Tournoi 2021', open: '', blavignac: '' },
            { tournoi: 'Tournoi 2022', open: 'GLAVINA Pablo', blavignac: 'PHELIPOT Lucas' },
            { tournoi: 'Tournoi 2023', open: 'BOUCQUET Emile', blavignac: 'BRUGUIER Florian' },
            { tournoi: 'Tournoi 2024', open: 'VELA FRAGO Alberto', blavignac: 'KANTACHE-HAMMOUTI Adam' },
            { tournoi: 'Tournoi 2025', open: 'LECOCQ Julien', blavignac: 'GABAIX John' },
            { tournoi: 'Tournoi 2026', open: 'ESTADIEU Romero', blavignac: 'MAHAULT Valentin' },
        ];

        function renderPalmares() {
            const container = document.getElementById('palmaresContainer');
            container.innerHTML = '';
            palmares.forEach((ligne, index) => {
                const row = document.createElement('div');
                row.className = 'admin-section-row';
                row.style.gridTemplateColumns = '1fr 1fr 1fr 50px';
                row.innerHTML = `
                    <div><input class="champ-admin" type="text" value="${ligne.tournoi}" placeholder="Ex: Tournoi 2027"></div>
                    <div><input class="champ-admin" type="text" value="${ligne.open}" placeholder="Vainqueur..."></div>
                    <div><input class="champ-admin" type="text" value="${ligne.blavignac}" placeholder="Vainqueur..."></div>
                    <div class="d-flex align-items-center justify-content-center">
                        <button class="btn-delete" onclick="supprimerLigne(${index})"><i class="bi bi-trash"></i></button>
                    </div>
                `;
                container.appendChild(row);
            });
        }

        function ajouterLigne() {
            palmares.push({ tournoi: '', open: '', blavignac: '' });
            renderPalmares();
        }

        function supprimerLigne(index) {
            palmares.splice(index, 1);
            renderPalmares();
        }

        function sauvegarderPalmares() {
            document.querySelectorAll('#palmaresContainer .admin-section-row').forEach((row, index) => {
                const inputs = row.querySelectorAll('input');
                palmares[index].tournoi = inputs[0].value;
                palmares[index].open = inputs[1].value;
                palmares[index].blavignac = inputs[2].value;
            });
            localStorage.setItem('palmares', JSON.stringify(palmares));
            alert('Palmarès sauvegardé !');
        }

        // ===================== PROCHAINS TOURNOIS =====================
        let tournois = JSON.parse(localStorage.getItem('prochains_tournois')) || [];

        function renderTournois() {
            const container = document.getElementById('tournoiContainer');
            container.innerHTML = '';
            tournois.forEach((t, index) => {
                const row = document.createElement('div');
                row.className = 'admin-section-row';
                row.style.gridTemplateColumns = '1fr 1fr 1fr 1fr 50px';
                row.innerHTML = `
                    <div><input class="champ-admin" type="text" value="${t.nom}" placeholder="Nom du tournoi"></div>
                    <div><input class="champ-admin" type="date" value="${t.dateDebut}"></div>
                    <div><input class="champ-admin" type="date" value="${t.dateFin}"></div>
                    <div><input class="champ-admin" type="text" value="${t.lieu}" placeholder="Lieu"></div>
                    <div class="d-flex align-items-center justify-content-center">
                        <button class="btn-delete" onclick="supprimerTournoi(${index})"><i class="bi bi-trash"></i></button>
                    </div>
                `;
                container.appendChild(row);
            });
        }

        function ajouterTournoi() {
            tournois.push({ nom: '', dateDebut: '', dateFin: '', lieu: '' });
            renderTournois();
        }

        function supprimerTournoi(index) {
            tournois.splice(index, 1);
            renderTournois();
        }

        function sauvegarderTournois() {
            document.querySelectorAll('#tournoiContainer .admin-section-row').forEach((row, index) => {
                const inputs = row.querySelectorAll('input');
                tournois[index].nom = inputs[0].value;
                tournois[index].dateDebut = inputs[1].value;
                tournois[index].dateFin = inputs[2].value;
                tournois[index].lieu = inputs[3].value;
            });
            localStorage.setItem('prochains_tournois', JSON.stringify(tournois));
            alert('Tournois sauvegardés !');
        }

        renderPalmares();
        renderTournois();
    </script>

</body>
</html>
